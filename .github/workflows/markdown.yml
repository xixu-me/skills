name: Markdown

on:
  push:
    paths:
      - "**/*.md"
      - ".editorconfig"
      - ".prettierignore"
      - ".prettierrc.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".editorconfig"
      - ".prettierignore"
      - ".prettierrc.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/markdown.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prettier:
    name: Check Markdown formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Markdown formatting
        run: npm run check:md
