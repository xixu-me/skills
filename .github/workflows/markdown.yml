name: Markdown

on:
  push:
    paths:
      - "**/*.md"
      - ".editorconfig"
      - ".prettierignore"
      - ".prettierrc.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".editorconfig"
      - ".prettierignore"
      - ".prettierrc.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/markdown.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prettier:
    name: Check Markdown formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Markdown formatting
        run: bun run check:md
